version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tryperson-web-app
    ports:
      - "8000:8000"
    volumes:
      - ./:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mysql
      - DB_HOST=people-jrlightweight-9ad0.g.aivencloud.com
      - DB_PORT=15175
      - DB_DATABASE=people
      - DB_USERNAME=avnadmin
      - DB_PASSWORD=${DB_PASSWORD}
      - MYSQL_ATTR_SSL_CA=/var/www/html/storage/certs/ca.pem
    command: php artisan serve --host=0.0.0.0 --port=8000
